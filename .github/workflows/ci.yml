---
name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  make:
    name: "${{ matrix.os }} with make"
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Cygwin Action
        uses: cygwin/cygwin-install-action@v6
        if: runner.os == 'Windows'
        with:
          packages: gcc-core gcc-g++ make libsqlite3-devel zlib-devel
      - name: Build
        run: |
          cores=${NUMBER_OF_PROCESSORS:-}
          if [ -z "${cores}" ]; then
            cores=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          fi
          make -j"${cores}"
        shell: bash
        env:
          CC: gcc
          CXX: g++
      - name: Set up Python for tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install test dependencies
        run: pip install -r requirements.txt
      - name: Test
        run: make test

  cmake:
    name: "${{ matrix.os }} with cmake"
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: |
          cores=${NUMBER_OF_PROCESSORS:-}
          if [ -z "${cores}" ]; then
            cores=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 2)
          fi
          cmake -B build
          cmake --build build -j"${cores}"
      - name: Set up Python for tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install test dependencies
        run: pip install -r requirements.txt
      - name: Test
        run: ctest --test-dir build --verbose

  # A dummy job that you can mark as a required check instead of each individual test
  test-suite:
    name: Test suite
    runs-on: ubuntu-latest
    needs:
      - make
      - cmake
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        if: ${{ needs.make.result != 'success' || needs.cmake.result != 'success' }}
        run: exit 1
